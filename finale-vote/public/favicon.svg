<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#111111"/>
  
  <!-- Ballot box body -->
  <rect x="22" y="45" width="56" height="38" rx="4" fill="none" stroke="white" stroke-width="5"/>
  
  <!-- Ballot slot on top of box -->
  <rect x="38" y="43" width="24" height="5" rx="2" fill="white"/>
  
  <!-- Ballot paper going in -->
  <rect x="40" y="18" width="20" height="28" rx="2" fill="white"/>
  
  <!-- Checkmark on ballot -->
  <polyline points="45,30 49,35 57,24" fill="none" stroke="#111111" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
